# RAVN-managed project metadata.
#
# Filled in by ravn-agent during prompts/project-create.md.
# Personal project — no Drive / client docs section.

project:
  name: "ravn-roam"
  display_name: "Roam"
  description: "全新 eSIM 產品 (personal). External collaborators planned."
  type: "personal"
  created: "2026-05-13"

linear:
  scope: "workspace"               # ADR-001 exception (TEC-29) — dedicated workspace, not the `ravn` hub
  workspace: "ravn-roam"           # Linear workspace URL key
  team_key: "ROA"
  team_id: null                    # filled once `linear-sync-team-workflow.py --apply` runs (currently blocked on sops firewall — see TEC-29 thread)

infra:
  vercel:
    scope: "ridcorixs-projects"    # firewall-cleared, no `transbiz` substring (ROA-13)
    org_id: "team_vy0ucdoFE2lw5ozI3SYTKCZ7"
    # Two projects, one repo (ROA-92). Each project's Root Directory points
    # at its app package so Vercel's Next.js detector finds the right
    # package.json. "Include source files outside of the Root Directory"
    # stays ON so workspace deps (packages/shared) install correctly.
    roam_web:
      project_name: "roam-web"
      project_id: "prj_0dreWsHEmlttOlBuxo19zZhZ8P96"
      root: "apps/landing"         # was "." before ROA-89 — must be re-pointed in dashboard
      package: "@roam/landing"
      git_connected: true          # auto-preview deploys on every branch/PR push
      production_branch: "main"
      ignored_build_step: "git diff --quiet HEAD^ HEAD -- apps/landing packages/shared pnpm-lock.yaml pnpm-workspace.yaml package.json"
    roam_system:
      project_name: "roam-system"
      project_id: null             # filled by Ray once the dashboard create step lands (ROA-92)
      root: "apps/web"
      package: "@roam/web"
      git_connected: true
      production_branch: "main"
      ignored_build_step: "git diff --quiet HEAD^ HEAD -- apps/web packages/shared pnpm-lock.yaml pnpm-workspace.yaml package.json"
  railway:
    # Personal scope only — `agent-rules/07-company-firewall.md` rejects any
    # workspace whose name contains `transbiz`. ROA-93 activates this.
    roam_api:
      project_name: "roam-api"
      service_root: "services/api"
      watch_paths:
        - "services/api/**"
        - "packages/shared/**"
      healthcheck_path: "/healthz"
      readiness_path: "/readyz"
      public_url: null             # filled by Ray after Railway auto-domain assignment (ROA-93)
      project_id: null             # filled by Ray once Railway project exists
  supabase:
    project: "ravn-shared"         # per agent-rules/06-shared-supabase.md
    schema: "roam_poc"
    roles:
      - name: "roam_poc_user"          # apps/web SSR + apps/landing — read/write under RLS
        secret_root: "supabase.shared.poc_roles.roam_poc.*"
      - name: "roam_poc_backend"       # services/api + drizzle-kit migrations (ROA-94)
        secret_root: "supabase.shared.poc_roles.roam_poc_backend.*"
    # Schema + roles provisioned against the shared DB by Ray (manual psql per agent-rules/06).
    # See docs/INFRA.md §2 for the SQL.
